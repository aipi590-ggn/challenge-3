<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIPI 590 Challenge 3 — Interactive Policy Visualization</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 16px 24px;
            border-bottom: 1px solid #1e2749;
            background: #0f1329;
        }

        h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .subtitle { font-size: 13px; color: #999; }

        main {
            flex: 1;
            display: flex;
            gap: 16px;
            padding: 16px 24px;
            overflow: hidden;
        }

        #viewport {
            flex: 1;
            background: #1a1f35;
            border-radius: 8px;
            border: 1px solid #2a3250;
            position: relative;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls {
            width: 280px;
            background: #0f1329;
            border: 1px solid #1e2749;
            border-radius: 8px;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #6ba3ff;
            letter-spacing: 0.5px;
        }

        select, input[type="range"], button {
            padding: 8px 12px;
            background: #1a1f35;
            border: 1px solid #2a3250;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        select:hover, button:hover {
            background: #252d4a;
            border-color: #3a4560;
        }

        button {
            font-weight: 600;
            background: #6ba3ff;
            color: #0f1329;
            border: none;
            padding: 10px;
        }

        button:hover { background: #7fb3ff; }

        .playback-controls {
            display: flex;
            gap: 8px;
        }

        .playback-controls button {
            flex: 1;
            padding: 8px;
            font-size: 12px;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .stats {
            background: #1a1f35;
            border: 1px solid #2a3250;
            border-radius: 4px;
            padding: 12px;
            font-size: 12px;
            color: #999;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
        }

        .stat-label { color: #666; }
        .stat-value { color: #e0e0e0; font-weight: 600; }

        .success { color: #4caf50; }
        .failure { color: #f44336; }

        footer {
            padding: 12px 24px;
            border-top: 1px solid #1e2749;
            font-size: 12px;
            color: #666;
        }

        a { color: #6ba3ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <h1>AIPI 590 Challenge 3</h1>
        <p class="subtitle">Interactive SAC+HER Policy Visualization</p>
    </header>

    <main>
        <div id="viewport">
            <canvas id="canvas"></canvas>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Episode</label>
                <select id="episodeSelect">
                    <option value="">Loading trajectories...</option>
                </select>
            </div>

            <div class="control-group">
                <label>Playback</label>
                <div class="playback-controls">
                    <button id="playBtn">▶ Play</button>
                    <button id="pauseBtn">⏸ Pause</button>
                    <button id="resetBtn">⏮ Reset</button>
                </div>
            </div>

            <div class="control-group">
                <label>Progress</label>
                <input type="range" id="scrubber" min="0" max="100" value="0">
                <div style="font-size: 11px; color: #666; text-align: center;">
                    <span id="currentStep">0</span> / <span id="totalSteps">—</span>
                </div>
            </div>

            <div class="control-group">
                <label>Speed</label>
                <input type="range" id="speedControl" min="0.1" max="2" step="0.1" value="1">
                <div style="font-size: 11px; color: #666; text-align: center;">
                    <span id="speedValue">1.0</span>x
                </div>
            </div>

            <div class="stats">
                <div class="stat-row">
                    <span class="stat-label">Task:</span>
                    <span class="stat-value" id="taskLabel">—</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Status:</span>
                    <span class="stat-value" id="statusLabel">—</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Duration:</span>
                    <span class="stat-value" id="durationLabel">—</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">End effector:</span>
                    <span class="stat-value" id="eeLabel">—</span>
                </div>
            </div>

            <div style="flex: 1;"></div>

            <footer style="border: none; padding: 0; color: #666; font-size: 11px;">
                <p><a href="https://github.com/jonasneves/aipi590-challenge-3" target="_blank">GitHub</a> • <a href="https://github.com/jonasneves/aipi590-challenge-3/blob/main/notebooks/challenge3-pickandplace.ipynb" target="_blank">Notebook</a></p>
            </footer>
        </div>
    </main>

    <footer>
        <p>Trained with SAC + Hindsight Experience Replay on FetchPickAndPlace-v4. Trajectories extracted from policy rollouts. Visualization uses <a href="https://github.com/google-deepmind/mujoco" target="_blank">MuJoCo</a> and <a href="https://threejs.org" target="_blank">Three.js</a>.</p>
    </footer>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
        import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        let scene, camera, renderer, controls;
        let trajectories = [];
        let currentEpisode = null;
        let currentStep = 0;
        let isPlaying = false;
        let playSpeed = 1.0;
        let animationFrameId = null;
        let lastUpdateTime = 0;

        const canvas = document.getElementById('canvas');
        const episodeSelect = document.getElementById('episodeSelect');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const scrubber = document.getElementById('scrubber');
        const speedControl = document.getElementById('speedControl');

        // Initialize Three.js scene
        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1f35);

            camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            camera.position.set(1.2, 0.8, 1.2);

            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            controls = new OrbitControls(camera, canvas);
            controls.target.set(0.5, 0, 0.5);
            controls.autoRotate = false;
            controls.update();

            // Lighting
            const light1 = new THREE.DirectionalLight(0xffffff, 0.6);
            light1.position.set(5, 5, 5);
            scene.add(light1);

            const light2 = new THREE.DirectionalLight(0xffffff, 0.3);
            light2.position.set(-5, 3, -5);
            scene.add(light2);

            const ambient = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambient);

            // Ground plane
            const groundGeom = new THREE.PlaneGeometry(2, 2);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a3250 });
            const ground = new THREE.Mesh(groundGeom, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.1;
            scene.add(ground);

            // Simple robot arm (placeholder visualization)
            drawRobot();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function drawRobot() {
            // Draw a simple arm structure (will be updated with trajectory data)
            const armGroup = new THREE.Group();
            armGroup.name = 'robot-arm';

            // Base
            const baseGeom = new THREE.CylinderGeometry(0.05, 0.05, 0.05, 16);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x4a5f8f });
            const base = new THREE.Mesh(baseGeom, baseMat);
            armGroup.add(base);

            // Simple links
            for (let i = 0; i < 3; i++) {
                const linkGeom = new THREE.CylinderGeometry(0.015, 0.015, 0.3, 8);
                const linkMat = new THREE.MeshStandardMaterial({ color: 0x6ba3ff });
                const link = new THREE.Mesh(linkGeom, linkMat);
                link.position.z = 0.2 + i * 0.3;
                link.castShadow = true;
                armGroup.add(link);
            }

            // End effector
            const eeGeom = new THREE.SphereGeometry(0.04, 16, 16);
            const eeMat = new THREE.MeshStandardMaterial({ color: 0x4caf50 });
            const ee = new THREE.Mesh(eeGeom, eeMat);
            ee.position.z = 1.0;
            ee.name = 'end-effector';
            armGroup.add(ee);

            scene.add(armGroup);
        }

        // Load trajectories
        async function loadTrajectories() {
            try {
                const response = await fetch('data/trajectories.json');
                if (!response.ok) {
                    throw new Error('Trajectories not found. Run notebooks to generate trajectory data.');
                }
                trajectories = await response.json();
                populateEpisodeSelect();
            } catch (error) {
                console.error('Error loading trajectories:', error);
                episodeSelect.innerHTML = '<option>Error: ' + error.message + '</option>';
            }
        }

        function populateEpisodeSelect() {
            episodeSelect.innerHTML = '';
            trajectories.forEach((traj, i) => {
                const option = document.createElement('option');
                const status = traj.success ? '✓' : '✗';
                option.value = i;
                option.textContent = `Episode ${traj.episode} ${status} (${traj.length} steps)`;
                episodeSelect.appendChild(option);
            });
            if (trajectories.length > 0) {
                episodeSelect.value = 0;
                loadEpisode(0);
            }
        }

        function loadEpisode(idx) {
            currentEpisode = trajectories[idx];
            currentStep = 0;
            isPlaying = false;
            scrubber.max = currentEpisode.timesteps.length - 1;
            updateDisplay();
        }

        function updateDisplay() {
            if (!currentEpisode) return;

            const ts = currentEpisode.timesteps[currentStep];
            if (!ts) return;

            // Update scrubber
            scrubber.value = currentStep;
            document.getElementById('currentStep').textContent = currentStep;
            document.getElementById('totalSteps').textContent = currentEpisode.timesteps.length - 1;

            // Update stats
            document.getElementById('taskLabel').textContent = currentEpisode.task.split('-')[0];
            document.getElementById('statusLabel').innerHTML =
                currentEpisode.success ? '<span class="success">✓ Success</span>' : '<span class="failure">✗ Failure</span>';
            document.getElementById('durationLabel').textContent = currentEpisode.length + ' steps';

            const ee = ts.object_position;
            document.getElementById('eeLabel').textContent =
                `[${ee[0].toFixed(2)}, ${ee[1].toFixed(2)}, ${ee[2].toFixed(2)}]`;

            // Update robot visualization (would animate here)
            updateRobotPose(ts);
        }

        function updateRobotPose(timestep) {
            const arm = scene.getObjectByName('robot-arm');
            if (!arm) return;

            // Placeholder: position end effector based on object position
            const ee = arm.getObjectByName('end-effector');
            if (ee) {
                ee.position.copy(new THREE.Vector3(...timestep.object_position));
            }
        }

        function animate() {
            animationFrameId = requestAnimationFrame(animate);

            if (isPlaying && currentEpisode) {
                const now = Date.now();
                const dt = (now - lastUpdateTime) / 1000;
                lastUpdateTime = now;

                currentStep += playSpeed * dt * 30;

                if (currentStep >= currentEpisode.timesteps.length - 1) {
                    currentStep = currentEpisode.timesteps.length - 1;
                    isPlaying = false;
                }
            }

            updateDisplay();
            controls.update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            const w = canvas.clientWidth;
            const h = canvas.clientHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        }

        // Event listeners
        episodeSelect.addEventListener('change', (e) => loadEpisode(parseInt(e.target.value)));
        playBtn.addEventListener('click', () => { isPlaying = true; lastUpdateTime = Date.now(); });
        pauseBtn.addEventListener('click', () => { isPlaying = false; });
        resetBtn.addEventListener('click', () => { currentStep = 0; isPlaying = false; });

        scrubber.addEventListener('input', (e) => {
            currentStep = parseInt(e.target.value);
            isPlaying = false;
        });

        speedControl.addEventListener('input', (e) => {
            playSpeed = parseFloat(e.target.value);
            document.getElementById('speedValue').textContent = playSpeed.toFixed(1);
        });

        // Start
        initScene();
        loadTrajectories();
    </script>
</body>
</html>

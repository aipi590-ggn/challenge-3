<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIPI 590 Challenge 3 — Policy Visualization</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0a0e27; color: #e0e0e0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header { padding: 16px 24px; border-bottom: 1px solid #1e2749; background: #0f1329; }
        h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .subtitle { font-size: 13px; color: #999; }
        main { flex: 1; display: flex; gap: 16px; padding: 16px 24px; overflow: hidden; }
        #viewport { flex: 1; background: #1a1f35; border-radius: 8px; border: 1px solid #2a3250; position: relative; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        .controls { width: 280px; background: #0f1329; border: 1px solid #1e2749; border-radius: 8px; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .control-group label { font-size: 12px; font-weight: 600; text-transform: uppercase; color: #6ba3ff; letter-spacing: 0.5px; }
        select, input[type="range"], button { padding: 8px 12px; background: #1a1f35; border: 1px solid #2a3250; border-radius: 4px; color: #e0e0e0; font-size: 13px; cursor: pointer; }
        button { font-weight: 600; background: #6ba3ff; color: #0f1329; border: none; padding: 10px; }
        button:hover { background: #7fb3ff; }
        button.active { background: #2da44e; color: #fff; }
        .playback-controls { display: flex; gap: 8px; }
        .playback-controls button { flex: 1; padding: 8px; font-size: 12px; }
        input[type="range"] { width: 100%; }
        .stats { background: #111528; border: 1px solid #1e2749; border-radius: 4px; padding: 12px; font-size: 12px; border-left: 3px solid #2a3250; }
        .stat-row { display: flex; justify-content: space-between; padding: 4px 0; }
        .stat-label { color: #555; } .stat-value { color: #e0e0e0; font-weight: 600; }
        .success { color: #4caf50; } .failure { color: #f44336; }
        .range-labels { display: flex; justify-content: space-between; font-size: 10px; color: #444; margin-top: -4px; }
        .range-labels .range-current { color: #e0e0e0; font-weight: 600; }
        .progress-readout { font-size: 11px; color: #666; text-align: center; }
        .sidebar-spacer { flex: 1; }
        .sidebar-links { font-size: 11px; color: #666; }
        footer { padding: 12px 24px; border-top: 1px solid #1e2749; font-size: 12px; color: #666; }
        a { color: #6ba3ff; text-decoration: none; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <header>
        <h1>AIPI 590 Challenge 3</h1>
        <p class="subtitle">Interactive SAC+HER Policy Visualization</p>
    </header>
    <main>
        <div id="viewport">
            <canvas id="canvas"></canvas>
            <div id="loading">Loading meshes...</div>
        </div>
        <div class="controls">
            <div class="control-group">
                <label>Episode</label>
                <select id="episodeSelect"><option>Loading...</option></select>
            </div>
            <div class="control-group">
                <label>Playback</label>
                <div class="playback-controls">
                    <button id="playPauseBtn">Play</button>
                    <button id="resetBtn">Reset</button>
                </div>
            </div>
            <div class="control-group">
                <label>Progress</label>
                <input type="range" id="scrubber" min="0" max="100" value="0">
                <div class="progress-readout"><span id="currentStep">0</span> / <span id="totalSteps">-</span></div>
            </div>
            <div class="control-group">
                <label>Speed</label>
                <input type="range" id="speedControl" min="0.1" max="3" step="0.1" value="1">
                <div class="range-labels"><span>0.1x</span><span class="range-current" id="speedValue">1.0x</span><span>3x</span></div>
            </div>
            <div class="stats">
                <div class="stat-row"><span class="stat-label">Task</span><span class="stat-value" id="taskLabel">-</span></div>
                <div class="stat-row"><span class="stat-label">Status</span><span class="stat-value" id="statusLabel">-</span></div>
                <div class="stat-row"><span class="stat-label">Duration</span><span class="stat-value" id="durationLabel">-</span></div>
            </div>
            <div class="sidebar-spacer"></div>
            <div class="sidebar-links">
                <p><a href="https://github.com/aipi590-ggn/aipi590-challenge-3">GitHub</a> &middot; <a href="https://github.com/aipi590-ggn/aipi590-challenge-3/blob/main/notebooks/challenge3-pickandplace.ipynb">Notebook</a></p>
            </div>
        </div>
    </main>
    <footer>Trained with SAC + Hindsight Experience Replay. Fetch robot meshes from gymnasium-robotics. Rendered with <a href="https://threejs.org">Three.js</a>.</footer>

    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }}
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';

        const MESH_FILES = {
            'robot0:base_link': 'base_link_collision.stl',
            'robot0:torso_lift_link': 'torso_lift_link_collision.stl',
            'robot0:shoulder_pan_link': 'shoulder_pan_link_collision.stl',
            'robot0:shoulder_lift_link': 'shoulder_lift_link_collision.stl',
            'robot0:upperarm_roll_link': 'upperarm_roll_link_collision.stl',
            'robot0:elbow_flex_link': 'elbow_flex_link_collision.stl',
            'robot0:forearm_roll_link': 'forearm_roll_link_collision.stl',
            'robot0:wrist_flex_link': 'wrist_flex_link_collision.stl',
            'robot0:wrist_roll_link': 'wrist_roll_link_collision.stl',
            'robot0:gripper_link': 'gripper_link.stl',
        };

        const FINGER_GEOMS = ['robot0:r_gripper_finger_link', 'robot0:l_gripper_finger_link'];

        const TRAIL_COLOR_SUCCESS = 0x4caf50;
        const TRAIL_COLOR_FAILURE = 0xf44336;
        const MAX_TRAIL_POINTS = 1000;

        // --- State ---
        let scene, camera, renderer, controls;
        let trajectories = [], currentEpisode = null, currentStep = 0;
        let isPlaying = false, playSpeed = 1, lastTime = 0;
        let geomMeshes = {};
        let goalMesh, trailLine, trailCount = 0;
        let trailBuffer;
        const canvas = document.getElementById('canvas');

        const _quat = new THREE.Quaternion();

        function mjQuat(q) {
            _quat.set(q[1], q[2], q[3], q[0]);
            return _quat;
        }


        function initTrailBuffer() {
            trailBuffer = new Float32Array(MAX_TRAIL_POINTS * 3);
            const geom = new THREE.BufferGeometry();
            geom.setAttribute('position', new THREE.BufferAttribute(trailBuffer, 3));
            geom.setDrawRange(0, 0);
            trailLine.geometry.dispose();
            trailLine.geometry = geom;
            trailCount = 0;
        }

        function appendTrailPoint(x, y, z) {
            if (trailCount >= MAX_TRAIL_POINTS) return;
            const i = trailCount * 3;
            trailBuffer[i] = x;
            trailBuffer[i + 1] = y;
            trailBuffer[i + 2] = z;
            trailCount++;
            trailLine.geometry.setDrawRange(0, trailCount);
            trailLine.geometry.attributes.position.needsUpdate = true;
        }

        function rebuildTrailFromPositions(positions) {
            trailCount = Math.min(positions.length, MAX_TRAIL_POINTS);
            for (let i = 0; i < trailCount; i++) {
                const j = i * 3;
                trailBuffer[j] = positions[i][0];
                trailBuffer[j + 1] = positions[i][1];
                trailBuffer[j + 2] = positions[i][2];
            }
            trailLine.geometry.setDrawRange(0, trailCount);
            trailLine.geometry.attributes.position.needsUpdate = true;
        }

        // --- Scene ---
        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a2035);
            scene.up.set(0, 0, 1);

            camera = new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 0.01, 100);
            camera.up.set(0, 0, 1);
            camera.position.set(2.8, -0.5, 1.5);

            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;

            controls = new OrbitControls(camera, canvas);
            controls.target.set(1.0, 0.75, 0.55);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.update();

            const key = new THREE.DirectionalLight(0xffffff, 1.2);
            key.position.set(2, -1, 4);
            key.castShadow = true;
            key.shadow.mapSize.set(2048, 2048);
            key.shadow.normalBias = 0.02;
            key.shadow.camera.left = -2;
            key.shadow.camera.right = 2;
            key.shadow.camera.top = 2;
            key.shadow.camera.bottom = -2;
            key.shadow.camera.near = 0.5;
            key.shadow.camera.far = 8;
            scene.add(key);
            scene.add(new THREE.DirectionalLight(0xb0c4de, 0.4).translateX(-2).translateZ(2));
            scene.add(new THREE.HemisphereLight(0xc8d8f0, 0x1a1a2e, 0.4));

            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(6, 6),
                new THREE.MeshStandardMaterial({ color: 0x0e1225, roughness: 1 })
            );
            ground.receiveShadow = true;
            scene.add(ground);

            const grid = new THREE.GridHelper(4, 20, 0x1a2040, 0x141830);
            grid.rotation.x = Math.PI / 2;
            scene.add(grid);

            // Table: match MuJoCo box half-extents (0.25, 0.35, 0.2) at center (1.3, 0.75, 0.2)
            const table = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 0.7, 0.4),
                new THREE.MeshStandardMaterial({ color: 0xededed, roughness: 0.7 })
            );
            table.position.set(1.3, 0.75, 0.2);
            table.receiveShadow = true;
            table.castShadow = true;
            scene.add(table);

            goalMesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.02, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0xff4422, emissive: 0x882211, transparent: true, opacity: 0.85 })
            );
            scene.add(goalMesh);
            const ring = new THREE.Mesh(
                new THREE.RingGeometry(0.03, 0.035, 32),
                new THREE.MeshBasicMaterial({ color: 0xff4422, side: THREE.DoubleSide, transparent: true, opacity: 0.5 })
            );
            ring.name = 'goal-ring';
            goalMesh.add(ring);

            trailLine = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineBasicMaterial({ color: TRAIL_COLOR_SUCCESS, transparent: true, opacity: 0.4 }));
            scene.add(trailLine);

            window.addEventListener('resize', onResize);
        }

        // MuJoCo material classes per link
        const LINK_MATERIALS = {
            'robot0:base_link': 'grey',
            'robot0:torso_lift_link': 'white',
            'robot0:shoulder_pan_link': 'white',
            'robot0:shoulder_lift_link': 'blue',
            'robot0:upperarm_roll_link': 'white',
            'robot0:elbow_flex_link': 'blue',
            'robot0:forearm_roll_link': 'white',
            'robot0:wrist_flex_link': 'blue',
            'robot0:wrist_roll_link': 'white',
            'robot0:gripper_link': 'gripper',
        };

        async function loadMeshes() {
            const loader = new STLLoader();
            const whiteMat = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 0.5, metalness: 0.2 });
            const greyMat = new THREE.MeshStandardMaterial({ color: 0x5b5c60, roughness: 0.6, metalness: 0.2 });
            const blueMat = new THREE.MeshStandardMaterial({ color: 0x1681c4, roughness: 0.5, metalness: 0.2 });
            const gripMat = new THREE.MeshStandardMaterial({ color: 0x404040, roughness: 0.6, metalness: 0.3 });
            const matMap = { white: whiteMat, grey: greyMat, blue: blueMat, gripper: gripMat };

            const promises = [];
            for (const [geomName, file] of Object.entries(MESH_FILES)) {
                promises.push(new Promise((resolve) => {
                    loader.load('meshes/fetch/' + file, (geometry) => {
                        geometry.computeVertexNormals();
                        const mat = matMap[LINK_MATERIALS[geomName]] || whiteMat;
                        const mesh = new THREE.Mesh(geometry, mat);
                        mesh.castShadow = true;
                        scene.add(mesh);
                        geomMeshes[geomName] = mesh;
                        resolve();
                    }, undefined, () => { console.warn('Failed: ' + file); resolve(); });
                }));
            }

            for (const name of FINGER_GEOMS) {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.077, 0.014, 0.027), gripMat);
                mesh.castShadow = true;
                scene.add(mesh);
                geomMeshes[name] = mesh;
            }

            await Promise.all(promises);
            document.getElementById('loading').style.display = 'none';
        }

        function updateRobot(ts) {
            const geoms = ts.geoms || ts.bodies;
            if (!geoms) return;

            for (const [name, mesh] of Object.entries(geomMeshes)) {
                const g = geoms[name];
                if (!g) { mesh.visible = false; continue; }
                mesh.visible = true;
                mesh.position.set(...g.pos);
                mesh.quaternion.copy(mjQuat(g.quat));
            }

            goalMesh.position.set(...ts.goal_position);
            const ring = goalMesh.getObjectByName('goal-ring');
            if (ring) ring.lookAt(camera.position);

            const grip = geoms['robot0:gripper_link'];
            if (grip) appendTrailPoint(...grip.pos);
        }

        function updateLegacy(ts) {
            for (const m of Object.values(geomMeshes)) m.visible = false;
            goalMesh.position.set(...ts.goal_position);
        }

        function updateDisplay() {
            if (!currentEpisode) return;
            const ts = currentEpisode.timesteps[Math.floor(currentStep)];
            if (!ts) return;
            document.getElementById('scrubber').value = Math.floor(currentStep);
            document.getElementById('currentStep').textContent = Math.floor(currentStep);
            if (ts.geoms || ts.bodies) updateRobot(ts);
            else updateLegacy(ts);
        }

        // --- Data: load and merge all available trajectory files ---
        async function loadTrajectories() {
            const files = [
                'data/trajectories-fetchreach-5ep.json',
                'data/trajectories-pickandplace-5ep.json',
                'data/trajectories.json',
            ];
            for (const f of files) {
                try {
                    const r = await fetch(f);
                    if (!r.ok) continue;
                    const data = await r.json();
                    if (Array.isArray(data) && data.length > 0) {
                        for (const ep of data) {
                            if (!trajectories.some(t => t.task === ep.task && t.episode === ep.episode)) {
                                trajectories.push(ep);
                            }
                        }
                    }
                } catch (e) { console.warn(f, e.message); }
            }
            if (trajectories.length > 0) populateEpisodes();
            else document.getElementById('episodeSelect').innerHTML = '<option>No data found</option>';
        }

        function populateEpisodes() {
            const sel = document.getElementById('episodeSelect');
            sel.innerHTML = '';
            trajectories.forEach((t, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                const task = (t.task || '').replace('Fetch', '').replace('-v4', '');
                opt.textContent = `${task} Ep${t.episode} [${t.success ? 'OK' : 'FAIL'}] (${t.length} steps)`;
                sel.appendChild(opt);
            });
            if (trajectories.length > 0) loadEpisode(0);
        }

        function loadEpisode(idx) {
            currentEpisode = trajectories[idx];
            currentStep = 0;
            setPlaying(false);
            initTrailBuffer();

            // Encode success/failure in the trail color
            const trailColor = currentEpisode.success ? TRAIL_COLOR_SUCCESS : TRAIL_COLOR_FAILURE;
            trailLine.material.color.setHex(trailColor);

            document.getElementById('scrubber').max = currentEpisode.timesteps.length - 1;
            document.getElementById('totalSteps').textContent = currentEpisode.timesteps.length - 1;
            document.getElementById('taskLabel').textContent = (currentEpisode.task || '-').replace('Fetch', '').replace('-v4', '');
            document.getElementById('statusLabel').innerHTML = currentEpisode.success
                ? '<span class="success">Success</span>' : '<span class="failure">Failure</span>';
            document.getElementById('durationLabel').textContent = currentEpisode.length + ' steps';
            updateDisplay();
        }

        // --- Playback state ---
        function setPlaying(playing) {
            isPlaying = playing;
            if (playing) lastTime = Date.now();
            const btn = document.getElementById('playPauseBtn');
            btn.textContent = playing ? 'Pause' : 'Play';
            btn.classList.toggle('active', playing);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isPlaying && currentEpisode) {
                const now = Date.now();
                currentStep += playSpeed * (now - lastTime) / 1000 * 25;
                lastTime = now;
                if (currentStep >= currentEpisode.timesteps.length - 1) {
                    currentStep = currentEpisode.timesteps.length - 1;
                    setPlaying(false);
                }
                updateDisplay();
            }
            controls.update();
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = canvas.clientWidth / canvas.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        }

        // --- Events ---
        document.getElementById('episodeSelect').addEventListener('change', e => loadEpisode(+e.target.value));
        document.getElementById('playPauseBtn').addEventListener('click', () => setPlaying(!isPlaying));
        document.getElementById('resetBtn').addEventListener('click', () => {
            currentStep = 0; setPlaying(false);
            initTrailBuffer();
            updateDisplay();
        });
        document.getElementById('scrubber').addEventListener('input', e => {
            currentStep = +e.target.value; setPlaying(false);
            const positions = [];
            for (let i = 0; i <= currentStep; i++) {
                const g = currentEpisode.timesteps[i]?.geoms?.['robot0:gripper_link'] || currentEpisode.timesteps[i]?.bodies?.['robot0:gripper_link'];
                if (g) positions.push(g.pos);
            }
            rebuildTrailFromPositions(positions);
            updateDisplay();
        });
        document.getElementById('speedControl').addEventListener('input', e => {
            playSpeed = +e.target.value;
            document.getElementById('speedValue').textContent = playSpeed.toFixed(1) + 'x';
        });

        // --- Init ---
        initScene();
        await loadMeshes();
        await loadTrajectories();
        animate();
    </script>
</body>
</html>
